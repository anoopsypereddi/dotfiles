# index by 1 -- makes it easier for nav
set -g pane-base-index 1
set -g base-index 1

# Preserve modified keys in tmux for apps like Pi/Claude Code
set -g extended-keys on
set -g extended-keys-format csi-u

# Jump to pane by number
bind 1 select-pane -t 1
bind 2 select-pane -t 2
bind 3 select-pane -t 3
bind 4 select-pane -t 4

# Remap prefix from C-b to C-Space 
unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Mouse Mode
set -g mouse on

# Pane Highlighting
set -g pane-active-border-style fg=green,bold
set -g pane-border-style fg=grey

bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Enable clipboard integration on macOS
set -s copy-command 'pbcopy'
set -s set-clipboard on
bind -T copy-mode-vi C-c send -X copy-pipe-and-cancel
bind -T copy-mode-vi y send -X copy-pipe

# Default to use zsh
run-shell "tmux set-option -g default-shell \"$(command -v zsh 2>/dev/null || echo $SHELL)\""

# History
set-option -g history-limit 5000

# Status bar
set -g status-style bg=#1e1e2e,fg=#cdd6f4
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #(cd #{pane_current_path} && basename $(git rev-parse --show-toplevel 2>/dev/null) 2>/dev/null || echo '#S') #[default] #[fg=#f9e2af]#(cd #{pane_current_path} && git branch --show-current 2>/dev/null || echo 'no git repo') #[default]"
set -g status-left-length 60
set -g status-interval 5
set -g status-right "#[fg=#a6e3a1] %H:%M #[fg=#cdd6f4]| %d %b "
set -g status-right-length 40
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[bg=#89b4fa,fg=#1e1e2e,bold] #I:#W "

